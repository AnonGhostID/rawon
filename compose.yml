x-common-general: &common-general
  restart: unless-stopped
  deploy:
    resources:
      limits:
        memory: 512M

services:
  rawon:
    <<: *common-general
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rawon-bot
    env_file:
      - path: .env
        required: true
      - path: dev.env
        required: false
    ports:
      - "${DEVTOOLS_PORT:-3000}:${DEVTOOLS_PORT:-3000}"
    volumes:
      - rawon:/app/cache

volumes:
  rawon:
